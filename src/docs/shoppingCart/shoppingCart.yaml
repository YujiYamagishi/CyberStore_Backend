# src/docs/swagger/shopping-cart.yaml

paths:
  /api/shopping_carts:
    post:
      summary: "Cria um novo carrinho"
      tags: [ShoppingCart]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                user_id:
                  type: integer
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      quantity:
                        type: integer
      responses:
        "201":
          description: "Carrinho criado com sucesso"
          content:
            application/json:
              schema:
                type: object
                properties:
                  shopping_cart_id:
                    type: integer
                  user_id:
                    type: integer
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        product_id:
                          type: integer
                        quantity:
                          type: integer
              example:
                shopping_cart_id: 1
                user_id: 123
                products:
                  - product_id: 10
                    quantity: 2
                  - product_id: 5
                    quantity: 1

  /api/shopping_carts/{shopping_cart_id}:
    put:
      summary: "Atualiza os itens do carrinho"
      tags: [ShoppingCart]
      parameters:
        - in: path
          name: shopping_cart_id
          required: true
          schema:
            type: integer
          description: "ID do carrinho a ser atualizado"
          example: 1
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                products:
                  type: array
                  items:
                    type: object
                    properties:
                      product_id:
                        type: integer
                      quantity:
                        type: integer
      responses:
        "200":
          description: "Carrinho atualizado"
          content:
            application/json:
              schema:
                type: object
                properties:
                  shopping_cart_id:
                    type: integer
                  user_id:
                    type: integer
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        product_id:
                          type: integer
                        quantity:
                          type: integer
              example:
                shopping_cart_id: 1
                user_id: 123
                products:
                  - product_id: 10
                    quantity: 3
                  - product_id: 5
                    quantity: 2

  /shopping-cart/{userId}:
    get:
      summary: "Busca o carrinho ativo de um usuário"
      tags: [ShoppingCart]
      parameters:
        - in: path
          name: userId
          required: true
          schema:
            type: integer
          description: "ID do usuário"
          example: 123
      responses:
        "200":
          description: "Retorna o carrinho ativo"
          content:
            application/json:
              schema:
                type: object
                properties:
                  shopping_cart_id:
                    type: integer
                  user_id:
                    type: integer
                  products:
                    type: array
                    items:
                      type: object
                      properties:
                        product_id:
                          type: integer
                        quantity:
                          type: integer
              example:
                shopping_cart_id: 1
                user_id: 123
                products:
                  - product_id: 10
                    quantity: 2
                  - product_id: 5
                    quantity: 1