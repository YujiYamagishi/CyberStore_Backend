/api/product/{id}:
  get:
    summary: Get product by ID
    description:  Returns the details of a product for the given ID, including all main attributes and specifications.
    tags:
      - Product
    parameters:
      - in: path
        name: id
        required: true
        schema:
          type: integer
    responses:
      200:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: object
                  properties:
                    id:
                      type: integer
                    name:
                      type: string
                    description:
                      type: string
                    brand:
                      type: string
                    price:
                      type: number
                    discounted_price:
                      type: number
                    stock:
                      type: integer
                    url_image:
                      type: string
                    created_at:
                      type: string
                      format: date-time
                    updated_at:
                      type: string
                      format: date-time
                    id_category:
                      type: integer
                    tag:
                      type: string
                    id_specs_smartphone:
                      type: integer
                      nullable: true
                    smartphoneSpec:
                      type: object
                      nullable: true
                      properties:
                        screen_size:
                          type: string
                        cpu:
                          type: string
                        total_cores:
                          type: string
                        main_camera:
                          type: string
                        front_camera:
                          type: string
                        battery:
                          type: string
                        created_at:
                          type: string
                          format: date-time
                        updated_at:
                          type: string
                          format: date-time
            example:
              data:
                id: 16
                name: "iPad Pro"
                description: "Apple tablet with M2 chip and Liquid Retina display"
                brand: "Apple"
                price: 7999
                discounted_price: 7499
                stock: 25
                url_image: "https://images.unsplash.com/photo-1623126908029-58cb08a2b272"
                created_at: "2025-08-29T17:43:00.082Z"
                updated_at: "2025-08-29T17:43:00.082Z"
                id_category: 3
                tag: "bestseller"
                id_specs_smartphone: null
                smartphoneSpec: null
      400:
        description: Id parameter is required.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: number
            example:
              error: Id parameter is required.
      404:
        description: Product not found.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Product not found.
      500:
        description: Internal server error.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Internal server error.

/api/products/tag/{tag}:
  get:
    summary: List products by tag
    description: Returns a list of products that match the specified tag.
    tags:
      - Product
    parameters:
      - in: path
        name: tag
        required: true
        schema:
          type: string
        example: bestseller
    responses:
      200:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      price:
                        type: number
                      tag:
                        type: string
                      url_image:
                        type: string
            example:
              data:
                - id: 1
                  name: "iPhone 15"
                  price: 7999
                  tag: "bestseller"
                  url_image: "https://images.unsplash.com/photo-1623126908029-58cb08a2b272"
                - id: 2
                  name: "Galaxy S23"
                  price: 6999
                  tag: "bestseller"
                  url_image: "https://cdn.pixabay.com/photo/2017/11/15/16/20/iphone-2854317_1280.png"
      400:
        description: Tag parameter is required.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Tag parameter is required.
      500:
        description: Internal server error.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Internal server error.

/api/products/related/{brand}:
  get:
    summary: List all products filtered by brand name
    description: Returns a list of products that belong to the specified brand.
    tags:
      - Product
    parameters:
      - in: path
        name: brand
        required: true
        schema:
          type: string
        example: Samsung
    responses:
      200:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      price:
                        type: number
                      url_image:
                        type: string
            example:
              data:
                - id: 2
                  name: "Galaxy S23"
                  price: 6999
                  url_image: "https://cdn.pixabay.com/photo/2017/11/15/16/20/iphone-2854317_1280.png"
                - id: 3
                  name: "Galaxy Z Fold"
                  price: 9999
                  url_image: "https://images.unsplash.com/photo-1623126908029-58cb08a2b272"
      400:
        description: Brand parameter is required.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Brand parameter is required.
      404:
        description: No products found for this brand.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: No products found for this brand.
      500:
        description: Internal server error.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Internal server error.

/api/products/category/{category}:
  get:
    summary: List products by category
    description: Returns a paginated list of products filtered by category, with optional sorting, ordering, and brand filters.
    tags:
      - Product
    parameters:
      - in: path
        name: category
        required: true
        schema:
          type: string
        description: The category name to filter products by.
        example: smartphone
      - in: query
        name: page
        required: false
        schema:
          type: integer
          default: 1
        description: Page number for pagination.
        example: 1
      - in: query
        name: limit
        required: false
        schema:
          type: integer
          default: 9
        description: Number of products per page.
        example: 9
      - in: query
        name: sort
        required: false
        schema:
          type: string
        description: Field to sort by (e.g., price, name).
        example: price
      - in: query
        name: order
        required: false
        schema:
          type: string
          enum: [asc, desc]
        description: Sort order (asc or desc).
        example: asc
      - in: query
        name: brands
        required: false
        schema:
          type: array
          items:
            type: string
        style: form
        explode: true
        description: Filter by one or more brands.
        example: [Samsung, Apple]
    responses:
      200:
        content:
          application/json:
            schema:
              type: object
              properties:
                data:
                  type: array
                  items:
                    type: object
                    properties:
                      id:
                        type: integer
                      name:
                        type: string
                      description:
                        type: string
                      brand:
                        type: string
                      price:
                        type: number
                      stock:
                        type: integer
                      url_image:
                        type: string
                      id_category:
                        type: integer
                metadata:
                  type: object
                  properties:
                    total_pages:
                      type: integer
                    actual_page:
                      type: integer
                    total_items:
                      type: integer
                    per_page:
                      type: integer
            example:
              data:
                - id: 1
                  name: "iPhone 15"
                  description: "Latest Apple smartphone"
                  brand: "Apple"
                  price: 7999
                  stock: 10
                  url_image: "https://images.unsplash.com/photo-1623126908029-58cb08a2b272"
                  id_category: 1
                - id: 2
                  name: "Galaxy S23"
                  description: "Flagship Samsung smartphone"
                  brand: "Samsung"
                  price: 6999
                  stock: 15
                  url_image: "https://cdn.pixabay.com/photo/2017/11/15/16/20/iphone-2854317_1280.png"
                  id_category: 1
              metadata:
                total_pages: 2
                actual_page: 1
                total_items: 12
                per_page: 9
      400:
        description: Category parameter is required.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Category parameter is required.
      500:
        description: Internal server error.
        content:
          application/json:
            schema:
              type: object
              properties:
                error:
                  type: string
            example:
              error: Internal server error.